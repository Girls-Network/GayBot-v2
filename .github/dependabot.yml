version: 2
updates:
  # ─── npm (Node dependencies) ────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    assignees:
      - "AriasADev"
      - "EstrogenHRT"
    commit-message:
      prefix: "npm"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Group related minor/patch bumps into single PRs to cut noise.
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      prettier:
        patterns:
          - "prettier"
          - "prettier-*"

  # ─── Docker base images ─────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    assignees:
      - "AriasADev"
      - "EstrogenHRT"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"

  # ─── GitHub Actions used by .github/workflows/*.yml ─────────────────────────
  # Keeps actions/checkout, actions/setup-node, etc. up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    assignees:
      - "AriasADev"
      - "EstrogenHRT"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # Roll all action bumps into one weekly PR — they almost never conflict.
    groups:
      actions:
        patterns:
          - "*"
